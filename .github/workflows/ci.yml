name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python3 -B -m unittest discover -s tests -v
      - name: Run LH preflight
        run: python3 scripts/lh_preflight.py
      - name: Run dashboard preview static checks
        run: python3 scripts/run_dashboard_preview.py

  dashboard-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dashboard dev dependencies
        run: npm ci
      - name: Install pinned Chromium
        run: npx --no-install playwright-core install --with-deps chromium
      - name: Run Chromium functional smoke (pixel baseline enforced locally only)
        # Pixel hashes are pinned to a specific Chromium build + fonts and are not portable
        # across environments (spec: baseline updates only on the pinned runtime, human-confirmed).
        # The smoke exits 2 for a pixel-only baseline mismatch and 1 for any functional/console/
        # request failure, so a pixel-only drift is non-blocking in CI while functional checks gate.
        run: |
          npm run dashboard:browser-smoke || code=$?
          if [ "${code:-0}" = "2" ]; then
            echo "::warning::pixel baseline drift (non-portable across Chromium/fonts); functional checks passed"
            exit 0
          fi
          exit "${code:-0}"
