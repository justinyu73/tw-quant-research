name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run open-source release audit
        run: python3 scripts/open_source_audit.py
      - name: Run unit, contract, and preview gates
        run: |
          python3 -B -m unittest discover -s tests -v
          python3 scripts/lh_preflight.py
          python3 scripts/run_dashboard_preview.py
      - name: Enforce strict audit for version tags
        if: github.event_name == 'push'
        run: python3 scripts/open_source_audit.py --strict --public-tree
      - name: Export clean open-source source archive
        run: python3 scripts/export_open_source_source.py
      - name: Upload clean source archive
        uses: actions/upload-artifact@v4
        with:
          name: tw-quant-research-source
          if-no-files-found: error
          path: outputs/tw-quant-research-source.tar.gz

  build:
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop build dependencies
        run: python -m pip install --disable-pip-version-check "pyinstaller==6.15.0"
      - name: Install Tauri dependencies
        run: npm ci
        working-directory: frontend
      - name: Build target-specific offline sidecar
        run: python scripts/build_tqe_sidecar.py --target "${{ matrix.target }}"
      - name: Prepare generated icon resources
        run: python scripts/ensure_tauri_icon.py
      - name: Build Tauri bundle
        run: npm run tauri:build -- --target "${{ matrix.target }}"
        working-directory: frontend
      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: tw-quant-research-${{ matrix.target }}
          if-no-files-found: error
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [audit, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches desktop version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          APP_VERSION=$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.conf.json"))["version"])')
          test "${RELEASE_TAG}" = "v${APP_VERSION}"
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: tw-quant-research-*
          path: release-assets
          merge-multiple: false
      - name: Collect distributable release assets
        run: |
          mkdir release-files
          while IFS= read -r -d '' asset; do
            filename="$(basename "${asset}")"
            case "${filename}" in
              *.msi|*-setup.exe|*.dmg|*.tar.gz)
                relative="${asset#release-assets/}"
                safe_name="${relative//\//__}"
                cp "${asset}" "release-files/${safe_name}"
                ;;
            esac
          done < <(find release-assets -type f -print0)
          test -n "$(find release-files -type f -print -quit)"
          mv release-assets release-assets-nested
          mv release-files release-assets
      - name: Prepare release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## TW Quant Research ${{ github.ref_name }}

          This is a read-only Taiwan stock research desktop app. It uses free,
          bounded local fixtures and does not provide live feeds, order routes,
          or automatic execution.

          Download the installer matching your platform:

          - Windows x64: `.msi` or `.exe`
          - macOS Intel: `x86_64-apple-darwin`
          - macOS Apple Silicon: `aarch64-apple-darwin`

          Release assets are limited to platform installers, the public source
          archive, and SHA-256 checksums. This release is unsigned; complete
          the human install/launch checks before treating it as production-ready.
          EOF
      - name: Generate SHA-256 checksums
        run: |
          (
            cd release-assets
            while IFS= read -r -d '' asset; do
              hash=$(sha256sum "${asset}" | cut -d' ' -f1)
              printf '%s  %s\n' "${hash}" "$(basename "${asset}")"
            done < <(find . -type f ! -name SHA256SUMS.txt -print0 | sort -z)
          ) | sort -k2,2 > release-assets/SHA256SUMS.txt
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' ASSETS < <(find release-assets -type f -print0)
          test "${#ASSETS[@]}" -gt 0
          gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
            --draft \
            --title "TW Quant Research ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
