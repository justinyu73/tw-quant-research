name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run open-source release audit
        run: python3 scripts/open_source_audit.py
      - name: Run unit, contract, and preview gates
        run: |
          python3 -B -m unittest discover -s tests -v
          python3 scripts/lh_preflight.py
          python3 scripts/run_dashboard_preview.py
      - name: Enforce strict audit for version tags
        if: github.event_name == 'push'
        run: python3 scripts/open_source_audit.py --strict --public-tree
      - name: Export clean open-source source archive
        run: python3 scripts/export_open_source_source.py
      - name: Upload clean source archive
        uses: actions/upload-artifact@v4
        with:
          name: tw-quant-research-source
          if-no-files-found: error
          path: outputs/tw-quant-research-source.tar.gz

  build:
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install desktop build dependencies
        run: python -m pip install --disable-pip-version-check "pyinstaller==6.15.0"
      - name: Install Tauri dependencies
        run: npm ci
        working-directory: frontend
      - name: Build target-specific offline sidecar
        run: python scripts/build_tqe_sidecar.py --target "${{ matrix.target }}"
      - name: Prepare generated icon resources
        run: python scripts/ensure_tauri_icon.py
      - name: Build Tauri bundle
        # Signed build: minisign updater signatures (.sig) are emitted next to
        # the nsis installer and the macOS app tarball when the key is present.
        run: npm run tauri:build -- --target "${{ matrix.target }}"
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: tw-quant-research-${{ matrix.target }}
          if-no-files-found: error
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [audit, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches desktop version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          APP_VERSION=$(python3 -c 'import json; print(json.load(open("frontend/src-tauri/tauri.conf.json"))["version"])')
          test "${RELEASE_TAG}" = "v${APP_VERSION}"
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: tw-quant-research-*
          path: release-assets
          merge-multiple: false
      - name: Collect distributable release assets
        run: |
          mkdir release-files
          while IFS= read -r -d '' asset; do
            filename="$(basename "${asset}")"
            relative="${asset#release-assets/}"
            case "${filename}" in
              *.app.tar.gz.sig)
                # Updater payloads keep their .sig sidecars (minisign).
                case "${relative}" in
                  *aarch64*) friendly_name="TQR-macOS-Apple-Silicon.app.tar.gz.sig" ;;
                  *) friendly_name="TQR-macOS-Intel.app.tar.gz.sig" ;;
                esac
                ;;
              *.app.tar.gz)
                case "${relative}" in
                  *aarch64*) friendly_name="TQR-macOS-Apple-Silicon.app.tar.gz" ;;
                  *) friendly_name="TQR-macOS-Intel.app.tar.gz" ;;
                esac
                ;;
              *-setup.exe.sig)
                friendly_name="TQR-Windows-x64-setup.exe.sig"
                ;;
              *.msi)
                friendly_name="TQR-Windows-x64.msi"
                ;;
              *-setup.exe)
                friendly_name="TQR-Windows-x64-setup.exe"
                ;;
              *_x64.dmg)
                friendly_name="TQR-macOS-Intel.dmg"
                ;;
              *_aarch64.dmg)
                friendly_name="TQR-macOS-Apple-Silicon.dmg"
                ;;
              *.tar.gz)
                friendly_name="TQR-source.tar.gz"
                ;;
              *)
                continue
                ;;
            esac
            if test -e "release-files/${friendly_name}"; then
              echo "duplicate distributable asset name: ${friendly_name}" >&2
              exit 1
            fi
            if test -n "${friendly_name}"; then
                cp "${asset}" "release-files/${friendly_name}"
            fi
          done < <(find release-assets -type f -print0)
          test -n "$(find release-files -type f -print -quit)"
          mv release-assets release-assets-nested
          mv release-files release-assets
      - name: Prepare release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## TW Quant Research ${{ github.ref_name }}

          This is a read-only Taiwan stock research desktop app. It uses free,
          bounded local fixtures and does not provide live feeds, order routes,
          or automatic execution.

          Download the installer matching your platform:

          - Windows x64 MSI: `TQR-Windows-x64.msi`
          - Windows x64 NSIS: `TQR-Windows-x64-setup.exe`
          - macOS Intel: `TQR-macOS-Intel.dmg`
          - macOS Apple Silicon: `TQR-macOS-Apple-Silicon.dmg`
          - Source: `TQR-source.tar.gz`

          macOS note: this release is unsigned. If macOS reports the app as
          damaged, remove the quarantine flag once after install:

          ```sh
          xattr -dr com.apple.quarantine "/Applications/TW Quant Research.app"
          ```

          Updates: after installing v0.2.0 or later, use 設定 → 檢查更新 for
          signed in-app updates; fresh installs always come from this page.

          In-app updates: the desktop app checks this release's `latest.json`
          when the user explicitly asks in Settings. Update payloads
          (`*.app.tar.gz`, `*-setup.exe`) are minisign-signed; the app verifies
          the signature against the embedded public key before installing.

          Release assets are limited to platform installers, signed updater
          payloads, the public source archive, and SHA-256 checksums. Complete
          the human install/launch checks before treating it as production-ready.
          EOF
      - name: Generate SHA-256 checksums
        run: |
          (
            cd release-assets
            while IFS= read -r -d '' asset; do
              hash=$(sha256sum "${asset}" | cut -d' ' -f1)
              printf '%s  %s\n' "${hash}" "$(basename "${asset}")"
            done < <(find . -type f ! -name SHA256SUMS.txt -print0 | sort -z)
          ) | sort -k2,2 > release-assets/SHA256SUMS.txt
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' ASSETS < <(find release-assets -type f -print0)
          test "${#ASSETS[@]}" -gt 0
          gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
            --draft \
            --title "TW Quant Research ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
      - name: Assemble and upload latest.json for the in-app updater
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - << 'PY'
          import datetime, json, os, subprocess, time

          repo = os.environ['GH_REPO']
          tag = os.environ['GITHUB_REF_NAME']

          def fetch_assets():
              # The by-tag endpoint only returns published releases; the
              # freshly created release here is a draft, so list and match.
              rels = json.loads(subprocess.check_output(
                  ['gh', 'api', f'repos/{repo}/releases?per_page=20']))
              rel = next(r for r in rels if r['tag_name'] == tag)
              return rel, {a['name']: a for a in rel['assets']}

          def have_updater_assets(names):
              mac_arm = 'TQR-macOS-Apple-Silicon.app.tar.gz' in names and 'TQR-macOS-Apple-Silicon.app.tar.gz.sig' in names
              mac_intel = 'TQR-macOS-Intel.app.tar.gz' in names and 'TQR-macOS-Intel.app.tar.gz.sig' in names
              win = 'TQR-Windows-x64-setup.exe' in names and 'TQR-Windows-x64-setup.exe.sig' in names
              return mac_arm and mac_intel and win

          # The releases API is read-after-write eventually consistent; wait
          # for the just-uploaded draft assets to become visible.
          for _ in range(12):
              rel, assets = fetch_assets()
              if have_updater_assets(assets):
                  break
              time.sleep(10)
          else:
              raise SystemExit('updater assets not all present after waiting ~2min')

          def sig_text(name):
              return subprocess.check_output(
                  ['gh', 'api', '-H', 'Accept: application/octet-stream',
                   f"repos/{repo}/releases/assets/{assets[name]['id']}"]).decode().strip()

          def asset_url(name):
              return f"https://api.github.com/repos/{repo}/releases/assets/{assets[name]['id']}"

          out = {
              'version': tag.lstrip('v'),
              'notes': rel.get('body') or '',
              'pub_date': datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': {
                  'darwin-aarch64': {
                      'signature': sig_text('TQR-macOS-Apple-Silicon.app.tar.gz.sig'),
                      'url': asset_url('TQR-macOS-Apple-Silicon.app.tar.gz'),
                  },
                  'darwin-x86_64': {
                      'signature': sig_text('TQR-macOS-Intel.app.tar.gz.sig'),
                      'url': asset_url('TQR-macOS-Intel.app.tar.gz'),
                  },
                  'windows-x86_64': {
                      'signature': sig_text('TQR-Windows-x64-setup.exe.sig'),
                      'url': asset_url('TQR-Windows-x64-setup.exe'),
                  },
              },
          }
          with open('latest.json', 'w') as fh:
              json.dump(out, fh, indent=1)
          print(json.dumps({k: v for k, v in out.items() if k != 'platforms'}))
          PY
          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
